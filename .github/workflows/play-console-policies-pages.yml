# Publishes play-console-policies/ to the gh-pages branch (no configure-pages API).
#
# REQUIRED ONCE PER REPO:
# 1. GitHub → Settings → Pages
# 2. Build and deployment → Source: "Deploy from a branch"
# 3. Branch: gh-pages, folder: / (root)
# 4. Push to main/master or Actions → Run workflow
#
# If your HTML/CSS lives at the repo root, set folder to "." instead of play-console-policies.
#
# Public site: https://<user>.github.io/<repo>/
name: Deploy Play Console policies site

on:
  push:
    branches: [master, main]
    paths:
      - "play-console-policies/**"
      - ".github/workflows/play-console-policies-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-play-console-policies
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: play-console-policies
          branch: gh-pages
          clean: true
