  # Publishes play-console-policies/ to GitHub Pages when you push to master or main.
  #
  # REQUIRED ONCE PER REPO (or configure-pages fails with "Get Pages site failed" / Not Found):
  # 1. GitHub → your repo → Settings → Pages
  # 2. Build and deployment → Source: GitHub Actions (not "Deploy from a branch")
  # 3. Save, then re-run this workflow (Actions tab → workflow → Run workflow)
  #
  # Docs: https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow
  name: Deploy Play Console policies site

  on:
    push:
      branches: [master, main]
      paths:
        - "play-console-policies/**"
        - ".github/workflows/play-console-policies-pages.yml"
    workflow_dispatch:

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: pages-play-console-policies
    cancel-in-progress: false

  jobs:
    deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/configure-pages@v5
        - uses: actions/upload-pages-artifact@v3
          with:
            path: play-console-policies
        - id: deployment
          uses: actions/deploy-pages@v4
