  # Publishes play-console-policies/ to GitHub Pages when you push to master or main.
  # After first run: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
  name: Deploy Play Console policies site

  on:
    push:
      branches: [master, main]
      paths:
        - "play-console-policies/**"
        - ".github/workflows/play-console-policies-pages.yml"
    workflow_dispatch:

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: pages-play-console-policies
    cancel-in-progress: false

  jobs:
    deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/configure-pages@v5
        - uses: actions/upload-pages-artifact@v3
          with:
            path: play-console-policies
        - id: deployment
          uses: actions/deploy-pages@v4
